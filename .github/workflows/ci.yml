name: CI

# Disabled: GitHub Actions account locked due to billing.
# Change trigger back to push/pull_request once billing is resolved.
on:
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fact_checker
          POSTGRES_PASSWORD: fact_checker
          POSTGRES_DB: fact_checker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt
          pip install pytest pytest-anyio httpx anyio[trio]

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://fact_checker:fact_checker@localhost:5432/fact_checker_test
          OPENROUTER_API_KEY: test-key-not-real
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
          OPENROUTER_MODEL: openai/gpt-4o-mini
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fact_checker:ci .
