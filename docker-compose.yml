version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: fact_checker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fact_checker
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fact_checker
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fact_checker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fact_checker_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fact_checker:password@db:5432/fact_checker
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-ultra-253b-v1:free}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./media_cache:/app/media_cache
    command: uvicorn fact_checker.api:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
