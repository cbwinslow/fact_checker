# alembic.ini - Alembic migration configuration for fact_checker
# The sqlalchemy.url is overridden in env.py via DATABASE_URL env var.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# URL placeholder - overridden at runtime by env.py reading DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/fact_checker

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
